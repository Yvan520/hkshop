<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="mistBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="mistBlurSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b898"/>
      <stop offset="30%" stop-color="#b8a888"/>
      <stop offset="70%" stop-color="#a09070"/>
      <stop offset="100%" stop-color="#908060"/>
    </linearGradient>
    <linearGradient id="bodySheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#d0d0d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b0b0b0" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="ledGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#ff8833" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff8833" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waterGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e0e8f0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0f4f8" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="520" rx="160" ry="16" fill="#00000018"/>

  <ellipse cx="400" cy="515" rx="120" ry="12" fill="#00000010"/>

  <rect x="400" y="440" width="140" height="8" rx="4" fill="#888" opacity="0.3"/>

  <rect x="330" y="220" width="140" height="280" rx="20" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="330" y="220" width="140" height="280" rx="20" fill="url(#bodySheen)"/>

  <rect x="340" y="420" width="120" height="70" rx="10" fill="url(#bodyGrad)" opacity="0.8"/>

  <rect x="345" y="428" width="110" height="8" rx="3" fill="#a09070"/>
  <rect x="345" y="442" width="110" height="8" rx="3" fill="#a09070"/>
  <rect x="345" y="456" width="110" height="8" rx="3" fill="#a09070"/>
  <rect x="345" y="470" width="110" height="8" rx="3" fill="#a09070"/>

  <rect x="345" y="245" width="110" height="160" rx="15" fill="url(#tankGrad)"/>
  <rect x="345" y="245" width="110" height="160" rx="15" fill="none" stroke="#c0c0c0" stroke-width="1" opacity="0.5"/>
  <rect x="350" y="270" width="100" height="130" rx="8" fill="url(#waterGrad)"/>

  <rect x="340" y="235" width="120" height="18" rx="6" fill="#c0b090"/>

  <ellipse cx="400" cy="230" rx="55" ry="10" fill="#d0c4a8"/>

  <circle cx="400" cy="505" r="40" fill="url(#ledGrad)" filter="url(#glow)"/>

  <ellipse cx="400" cy="505" r="30" fill="#ffaa44" opacity="0.6"/>
  <ellipse cx="400" cy="505" r="15" fill="#ffcc66" opacity="0.4"/>

  <ellipse cx="400" cy="200" rx="30" ry="8" fill="white" opacity="0.3" filter="url(#mistBlur)"/>
  <ellipse cx="410" cy="180" rx="35" ry="10" fill="white" opacity="0.25" filter="url(#mistBlur)"/>
  <ellipse cx="390" cy="155" rx="40" ry="12" fill="white" opacity="0.2" filter="url(#mistBlur)"/>
  <ellipse cx="405" cy="130" rx="45" ry="14" fill="white" opacity="0.15" filter="url(#mistBlur)"/>
  <ellipse cx="395" cy="105" rx="50" ry="16" fill="white" opacity="0.1" filter="url(#mistBlurSoft)"/>
  <ellipse cx="408" cy="80" rx="55" ry="18" fill="white" opacity="0.08" filter="url(#mistBlurSoft)"/>

  <ellipse cx="385" cy="190" rx="15" ry="5" fill="white" opacity="0.15" filter="url(#mistBlur)"/>
  <ellipse cx="415" cy="170" rx="18" ry="6" fill="white" opacity="0.12" filter="url(#mistBlur)"/>
</svg>
