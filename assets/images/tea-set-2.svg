<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="steamBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="teapotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4c0"/>
      <stop offset="40%" stop-color="#9cbfa0"/>
      <stop offset="100%" stop-color="#7a9e80"/>
    </linearGradient>
    <linearGradient id="teaStreamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c88830" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a06820" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4c0"/>
      <stop offset="50%" stop-color="#9cbfa0"/>
      <stop offset="100%" stop-color="#7a9e80"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c49a60"/>
      <stop offset="50%" stop-color="#b08850"/>
      <stop offset="100%" stop-color="#907040"/>
    </linearGradient>
    <linearGradient id="teaFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d49040"/>
      <stop offset="100%" stop-color="#b07828"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="420" cy="500" rx="250" ry="20" fill="#00000010"/>

  <ellipse cx="420" cy="480" rx="180" ry="12" fill="url(#woodGrad)" opacity="0.6" filter="url(#shadow)"/>

  <g transform="rotate(-30, 320, 250)">
    <rect x="220" y="160" width="180" height="140" rx="60" fill="url(#teapotGrad)" filter="url(#shadow)"/>
    <rect x="240" y="180" width="140" height="100" rx="40" fill="#d0e8d4" opacity="0.3"/>
    <rect x="285" y="110" width="50" height="55" rx="25" fill="url(#teapotGrad)" filter="url(#shadow)"/>
    <rect x="295" y="120" width="30" height="35" rx="15" fill="#c8e0cc" opacity="0.3"/>
    <rect x="270" y="105" width="80" height="10" rx="5" fill="url(#teapotGrad)"/>
    <circle cx="310" cy="100" r="7" fill="#6a8e70"/>
    <path d="M 400 200 Q 440 190 430 230 Q 425 250 410 260" fill="none" stroke="url(#woodGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M 218 250 Q 200 250 195 260" fill="none" stroke="#c49a60" stroke-width="4" stroke-linecap="round"/>
  </g>

  <path d="M 280 370 Q 310 390 340 400 Q 350 404 355 410" fill="none" stroke="url(#teaStreamGrad)" stroke-width="6" stroke-linecap="round"/>

  <path d="M 285 375 Q 315 395 342 404" fill="none" stroke="#d49040" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <path d="M 288 368 Q 305 355 320 345" fill="none" stroke="#d49040" stroke-width="2" opacity="0.3"/>

  <g filter="url(#shadow)">
    <rect x="340" y="410" width="80" height="65" rx="18" fill="url(#cupGrad)"/>
    <rect x="352" y="420" width="56" height="45" rx="12" fill="#d0e8d4" opacity="0.2"/>
    <path d="M 420 430 Q 438 434 435 448 Q 432 458 420 462" fill="none" stroke="url(#woodGrad)" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="380" cy="410" rx="40" ry="8" fill="#8ab890"/>
    <ellipse cx="380" cy="415" rx="30" ry="5" fill="url(#teaFill)" opacity="0.8"/>
  </g>

  <ellipse cx="335" cy="358" rx="12" ry="4" fill="none" stroke="#c0d8c4" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="340" cy="348" rx="10" ry="3" fill="none" stroke="#c0d8c4" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="345" cy="338" rx="8" ry="2.5" fill="none" stroke="#c0d8c4" stroke-width="1.5" opacity="0.3"/>

  <ellipse cx="365" cy="350" rx="2" ry="6" fill="white" opacity="0.3" filter="url(#steamBlur)"/>
  <ellipse cx="370" cy="340" rx="2.5" ry="7" fill="white" opacity="0.25" filter="url(#steamBlur)"/>
  <ellipse cx="360" cy="360" rx="2" ry="5" fill="white" opacity="0.2" filter="url(#steamBlur)"/>

  <ellipse cx="345" cy="355" rx="3" ry="8" fill="white" opacity="0.2" filter="url(#steamBlur)"/>
  <ellipse cx="355" cy="345" rx="2" ry="6" fill="white" opacity="0.15" filter="url(#steamBlur)"/>

  <g filter="url(#shadow)">
    <rect x="530" y="440" width="50" height="50" rx="12" fill="url(#cupGrad)"/>
    <rect x="538" y="448" width="34" height="35" rx="8" fill="#d0e8d4" opacity="0.2"/>
    <path d="M 580 452 Q 592 455 590 465 Q 588 472 580 475" fill="none" stroke="url(#woodGrad)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="555" cy="440" rx="25" ry="5" fill="#8ab890"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="615" y="445" width="50" height="50" rx="12" fill="url(#cupGrad)"/>
    <rect x="623" y="453" width="34" height="35" rx="8" fill="#d0e8d4" opacity="0.2"/>
    <path d="M 665 457 Q 677 460 675 470 Q 672 477 665 480" fill="none" stroke="url(#woodGrad)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="640" cy="445" rx="25" ry="5" fill="#8ab890"/>
  </g>
</svg>
