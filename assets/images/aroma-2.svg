<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="mistBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b898"/>
      <stop offset="30%" stop-color="#b8a888"/>
      <stop offset="70%" stop-color="#a09070"/>
      <stop offset="100%" stop-color="#908060"/>
    </linearGradient>
    <linearGradient id="bodySheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="25%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8c8c8" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="btnGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44cc88" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#44cc88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waterLevel" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d0dce8" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#e0eaf4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f0f4f8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="510" rx="140" ry="14" fill="#00000015"/>

  <rect x="340" y="290" width="120" height="210" rx="15" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="340" y="290" width="120" height="210" rx="15" fill="url(#bodySheen)"/>

  <rect x="352" y="310" width="96" height="100" rx="12" fill="url(#tankGrad)"/>
  <rect x="352" y="310" width="96" height="100" rx="12" fill="none" stroke="#c0c0c0" stroke-width="0.8" opacity="0.4"/>
  <rect x="358" y="340" width="84" height="65" rx="6" fill="url(#waterLevel)"/>

  <text x="400" y="388" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#909090" opacity="0.6">200ml</text>
  <line x1="358" y1="393" x2="442" y2="393" stroke="#c0c0c0" stroke-width="0.5" opacity="0.4"/>

  <rect x="345" y="420" width="110" height="70" rx="8" fill="#a09070" opacity="0.5"/>

  <circle cx="370" cy="435" r="6" fill="#666"/>
  <circle cx="370" cy="435" r="4" fill="#555"/>
  <circle cx="400" cy="435" r="6" fill="#666"/>
  <circle cx="400" cy="435" r="4" fill="url(#btnGlow)"/>
  <circle cx="400" cy="435" r="2" fill="#44cc88"/>
  <circle cx="430" cy="435" r="6" fill="#666"/>
  <circle cx="430" cy="435" r="4" fill="#555"/>

  <rect x="360" y="455" width="80" height="3" rx="1.5" fill="#888"/>
  <rect x="360" y="465" width="80" height="3" rx="1.5" fill="#888"/>
  <rect x="360" y="475" width="80" height="3" rx="1.5" fill="#888"/>

  <ellipse cx="400" cy="305" rx="45" ry="6" fill="#d0c4a8"/>

  <ellipse cx="400" cy="495" rx="50" ry="8" fill="#a09070" opacity="0.5"/>

  <ellipse cx="400" cy="285" rx="20" ry="5" fill="white" opacity="0.2" filter="url(#mistBlur)"/>
  <ellipse cx="395" cy="275" rx="22" ry="6" fill="white" opacity="0.15" filter="url(#mistBlur)"/>
  <ellipse cx="405" cy="262" rx="18" ry="5" fill="white" opacity="0.1" filter="url(#mistBlur)"/>

  <text x="400" y="545" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a09070" opacity="0.7">200ml &middot; Touch Control</text>
</svg>
