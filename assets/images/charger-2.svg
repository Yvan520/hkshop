<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="chargerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="40%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="chargerSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#666" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#444" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="usbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="50%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="500" rx="200" ry="18" fill="#00000012"/>

  <g transform="rotate(-5, 400, 350)">
    <rect x="250" y="340" width="300" height="150" rx="40" fill="url(#chargerGrad)" filter="url(#shadow)"/>
    <rect x="260" y="345" width="280" height="135" rx="35" fill="url(#chargerSheen)"/>

    <line x1="280" y1="345" x2="280" y2="480" stroke="#333" stroke-width="1" opacity="0.3"/>
    <line x1="520" y1="345" x2="520" y2="480" stroke="#333" stroke-width="1" opacity="0.3"/>

    <rect x="260" y="340" width="60" height="20" rx="5" fill="#3a3a3a"/>
    <rect x="270" y="345" width="40" height="5" rx="2.5" fill="#555" opacity="0.5"/>

    <rect x="480" y="340" width="60" height="20" rx="5" fill="#3a3a3a"/>
    <rect x="490" y="345" width="40" height="5" rx="2.5" fill="#555" opacity="0.5"/>

    <rect x="320" y="340" width="160" height="10" rx="5" fill="#333" opacity="0.5"/>

    <rect x="310" y="350" width="180" height="60" rx="10" fill="#1a1a1a"/>
    <circle cx="360" cy="380" r="12" fill="#2a2a2a"/>
    <circle cx="440" cy="380" r="12" fill="#2a2a2a"/>

    <rect x="310" y="420" width="180" height="55" rx="10" fill="#1a1a1a"/>

    <rect x="410" y="475" width="30" height="10" rx="3" fill="#555"/>
    <rect x="360" y="475" width="30" height="10" rx="3" fill="#555"/>

    <rect x="250" y="380" width="15" height="70" rx="3" fill="#3a3a3a"/>
    <rect x="535" y="380" width="15" height="70" rx="3" fill="#3a3a3a"/>
  </g>

  <rect x="230" y="495" width="60" height="6" rx="3" fill="url(#usbGrad)" filter="url(#softShadow)"/>
  <rect x="245" y="497" width="30" height="2" rx="1" fill="#888"/>

  <path d="M 230 498 Q 200 498 190 490 Q 180 480 175 475" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <path d="M 230 498 Q 200 498 190 490 Q 180 480 175 475" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>

  <text x="400" y="545" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Folded for Travel</text>
</svg>
