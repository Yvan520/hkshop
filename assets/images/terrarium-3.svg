<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <radialGradient id="innerBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8dcc8"/>
      <stop offset="60%" stop-color="#d4c4a8"/>
      <stop offset="100%" stop-color="#c0b090"/>
    </radialGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#e0e8f0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d0d8e4" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#4a2a10"/>
    </linearGradient>
    <linearGradient id="mossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a9a3a"/>
      <stop offset="50%" stop-color="#4a8830"/>
      <stop offset="100%" stop-color="#3a7020"/>
    </linearGradient>
    <radialGradient id="pebbleGrad" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#c8b898"/>
      <stop offset="100%" stop-color="#a09070"/>
    </radialGradient>
    <radialGradient id="ledRingGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#ffaa22" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffaa22" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="530" rx="220" ry="20" fill="#00000010"/>

  <circle cx="400" cy="280" r="200" fill="url(#glassGrad)" stroke="#c0d0e0" stroke-width="2" opacity="0.4" filter="url(#shadow)"/>

  <circle cx="400" cy="280" r="195" fill="url(#innerBg)" opacity="0.3"/>

  <circle cx="400" cy="460" r="140" fill="url(#pebbleGrad)" opacity="0.6"/>
  <circle cx="340" cy="450" r="10" fill="#b8a888" opacity="0.5"/>
  <circle cx="380" cy="460" r="8" fill="#b8a888" opacity="0.5"/>
  <circle cx="420" cy="455" r="9" fill="#b8a888" opacity="0.5"/>
  <circle cx="460" cy="450" r="11" fill="#b8a888" opacity="0.5"/>
  <circle cx="360" cy="470" r="7" fill="#b8a888" opacity="0.4"/>
  <circle cx="440" cy="468" r="8" fill="#b8a888" opacity="0.4"/>
  <circle cx="320" cy="465" r="6" fill="#b8a888" opacity="0.4"/>
  <circle cx="480" cy="460" r="7" fill="#b8a888" opacity="0.4"/>

  <circle cx="400" cy="410" r="110" fill="url(#charcoalGrad)" opacity="0.3"/>

  <ellipse cx="400" cy="370" rx="120" ry="40" fill="url(#soilGrad)" opacity="0.7"/>

  <ellipse cx="400" cy="360" rx="120" ry="35" fill="url(#mossGrad)" opacity="0.5"/>

  <ellipse cx="360" cy="355" rx="30" ry="12" fill="#5a9a3a" opacity="0.4"/>
  <ellipse cx="440" cy="360" rx="25" ry="10" fill="#5a9a3a" opacity="0.4"/>
  <ellipse cx="400" cy="350" rx="20" ry="8" fill="#6aaa40" opacity="0.3"/>

  <circle cx="355" cy="350" r="4" fill="#6aaa40" opacity="0.5"/>
  <circle cx="370" cy="355" r="3" fill="#6aaa40" opacity="0.5"/>
  <circle cx="430" cy="355" r="4" fill="#6aaa40" opacity="0.5"/>
  <circle cx="445" cy="360" r="3" fill="#6aaa40" opacity="0.4"/>
  <circle cx="390" cy="345" r="3" fill="#6aaa40" opacity="0.4"/>
  <circle cx="415" cy="348" r="3.5" fill="#6aaa40" opacity="0.4"/>

  <path d="M 340 350 Q 335 335 345 330" fill="none" stroke="#5a9a3a" stroke-width="1.5" opacity="0.4"/>
  <path d="M 460 355 Q 465 340 455 335" fill="none" stroke="#5a9a3a" stroke-width="1.5" opacity="0.4"/>

  <rect x="385" y="310" width="30" height="30" rx="8" fill="#d08050" opacity="0.8"/>
  <rect x="387" y="315" width="26" height="10" rx="4" fill="#e09060" opacity="0.7"/>
  <ellipse cx="400" cy="312" rx="8" ry="4" fill="#e09060" opacity="0.7"/>
  <ellipse cx="403" cy="309" rx="3" ry="2" fill="#f0a070" opacity="0.6"/>

  <circle cx="400" cy="280" r="190" fill="url(#ledRingGrad)" filter="url(#glow)"/>

  <circle cx="400" cy="280" r="195" fill="none" stroke="#ffcc44" stroke-width="3" opacity="0.3" filter="url(#glow)"/>

  <circle cx="340" cy="285" r="4" fill="#ffcc44" opacity="0.5"/>
  <circle cx="370" cy="278" r="5" fill="#ffcc44" opacity="0.4"/>
  <circle cx="400" cy="275" r="6" fill="#ffcc44" opacity="0.5"/>
  <circle cx="430" cy="278" r="5" fill="#ffcc44" opacity="0.4"/>
  <circle cx="460" cy="285" r="4" fill="#ffcc44" opacity="0.5"/>

  <text x="400" y="570" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888" opacity="0.6">Layered Ecosystem &middot; Top View</text>
</svg>
