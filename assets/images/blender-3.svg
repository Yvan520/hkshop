<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#e0e8f0" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#d0dce8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c0d0e0" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sleeveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4088cc"/>
      <stop offset="50%" stop-color="#3070b0"/>
      <stop offset="100%" stop-color="#205890"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="40%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="30%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="bagSheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="530" rx="250" ry="22" fill="#00000010"/>

  <rect x="460" y="280" width="180" height="200" rx="20" fill="url(#bagGrad)" filter="url(#shadow)"/>
  <rect x="460" y="280" width="180" height="200" rx="20" fill="url(#bagSheen)"/>

  <rect x="475" y="295" width="150" height="170" rx="12" fill="#2a2a2a"/>
  <rect x="480" y="300" width="140" height="160" rx="8" fill="#222"/>

  <rect x="510" y="290" width="80" height="15" rx="4" fill="#555"/>

  <path d="M 550 290 L 550 270" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <path d="M 545 275 Q 550 268 555 275" fill="none" stroke="#555" stroke-width="2"/>

  <rect x="475" y="460" width="150" height="15" rx="5" fill="#333"/>

  <rect x="485" y="465" width="25" height="5" rx="2" fill="#555"/>
  <rect x="590" y="465" width="25" height="5" rx="2" fill="#555"/>

  <text x="550" y="395" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555" letter-spacing="4" transform="rotate(-90, 550, 395)">GYM</text>

  <g transform="rotate(-10, 320, 380)">
    <rect x="270" y="200" width="100" height="240" rx="14" fill="url(#cupGrad)" filter="url(#shadow)"/>
    <rect x="270" y="200" width="100" height="240" rx="14" fill="none" stroke="#c0d0e0" stroke-width="1" opacity="0.4"/>

    <rect x="270" y="350" width="100" height="90" rx="8" fill="url(#sleeveGrad)"/>

    <rect x="270" y="440" width="100" height="35" rx="8" fill="url(#baseGrad)"/>
    <ellipse cx="320" cy="440" rx="38" ry="4" fill="#1a1a1a"/>

    <rect x="295" y="200" width="50" height="40" rx="10" fill="url(#cupGrad)" opacity="0.5"/>

    <circle cx="310" cy="218" r="5" fill="#e05050" opacity="0.4"/>
    <circle cx="325" cy="225" r="4" fill="#e05050" opacity="0.3"/>

    <rect x="280" y="195" width="80" height="10" rx="5" fill="url(#lidGrad)"/>
    <rect x="295" y="188" width="50" height="12" rx="4" fill="url(#lidGrad)"/>
    <rect x="310" y="180" width="20" height="14" rx="5" fill="url(#lidGrad)"/>
    <rect x="315" y="175" width="10" height="8" rx="3" fill="#c0c0c0"/>
  </g>

  <path d="M 280 450 Q 265 460 260 470 Q 255 480 265 485" fill="none" stroke="#3070b0" stroke-width="4" stroke-linecap="round"/>
  <circle cx="260" cy="485" r="6" fill="none" stroke="#3070b0" stroke-width="2"/>
  <circle cx="260" cy="485" r="3" fill="#4088cc" opacity="0.5"/>

  <rect x="268" y="355" width="4" height="30" rx="2" fill="#4088cc" opacity="0.6"/>
  <rect x="268" y="390" width="4" height="30" rx="2" fill="#4088cc" opacity="0.4"/>
  <rect x="268" y="425" width="4" height="15" rx="2" fill="#4088cc" opacity="0.3"/>

  <text x="400" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Ready for the gym &middot; Carry loop &amp; grip</text>
</svg>
