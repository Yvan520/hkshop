<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff8ed"/>
      <stop offset="25%" stop-color="#f5dcc0"/>
      <stop offset="55%" stop-color="#e8c488"/>
      <stop offset="85%" stop-color="#d4a96a"/>
      <stop offset="100%" stop-color="#c49a60"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c542" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#f5c542" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5c542" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="craterShade" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#b8894e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c49a60" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="craterHighlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5dcc0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4a96a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <circle cx="400" cy="280" r="230" fill="url(#moonGlow)" filter="url(#softGlow)"/>

  <circle cx="400" cy="270" r="200" fill="url(#moonGrad)" filter="url(#shadow)"/>

  <ellipse cx="355" cy="225" rx="40" ry="12" fill="url(#craterShade)" opacity="0.5"/>
  <ellipse cx="355" cy="222" rx="38" ry="8" fill="url(#craterHighlight)"/>
  <ellipse cx="440" cy="305" rx="35" ry="10" fill="url(#craterShade)" opacity="0.45"/>
  <ellipse cx="440" cy="302" rx="33" ry="7" fill="url(#craterHighlight)"/>
  <ellipse cx="370" cy="340" rx="25" ry="7" fill="url(#craterShade)" opacity="0.4"/>
  <ellipse cx="370" cy="337" rx="23" ry="5" fill="url(#craterHighlight)"/>
  <ellipse cx="460" cy="240" rx="20" ry="6" fill="url(#craterShade)" opacity="0.35"/>
  <ellipse cx="460" cy="238" rx="18" ry="4" fill="url(#craterHighlight)"/>
  <ellipse cx="330" cy="290" rx="22" ry="6" fill="url(#craterShade)" opacity="0.35"/>
  <ellipse cx="420" cy="180" rx="18" ry="5" fill="url(#craterShade)" opacity="0.3"/>
  <ellipse cx="480" cy="350" rx="15" ry="4" fill="url(#craterShade)" opacity="0.3"/>
  <ellipse cx="300" cy="250" rx="14" ry="4" fill="url(#craterShade)" opacity="0.25"/>
  <ellipse cx="500" cy="270" rx="12" ry="3" fill="url(#craterShade)" opacity="0.2"/>

  <circle cx="400" cy="270" r="200" fill="none" stroke="#f5dcc0" stroke-width="1" opacity="0.2"/>

  <rect x="375" y="530" width="50" height="8" rx="4" fill="#333"/>
  <rect x="385" y="538" width="30" height="4" rx="2" fill="#555"/>
</svg>
