<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#e0e8f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d0d8e4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0d0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b0c0d0" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bagSoil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#3a2510"/>
    </linearGradient>
    <linearGradient id="bagPebble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8a888"/>
      <stop offset="100%" stop-color="#908060"/>
    </linearGradient>
    <linearGradient id="bagMoss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a9a3a"/>
      <stop offset="100%" stop-color="#4a8830"/>
    </linearGradient>
    <linearGradient id="bagCharcoal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0ece4"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="550" rx="350" ry="25" fill="#00000008"/>

  <g transform="rotate(-5, 400, 300)">
    <rect x="290" y="130" width="220" height="340" rx="25" fill="url(#glassGrad)" stroke="url(#glassEdge)" stroke-width="2" filter="url(#shadow)"/>
    <rect x="300" y="140" width="200" height="320" rx="18" fill="none" stroke="#d0d8e4" stroke-width="0.5" opacity="0.3"/>
  </g>

  <rect x="105" y="380" width="140" height="100" rx="10" fill="url(#bagPebble)" filter="url(#softShadow)"/>
  <rect x="105" y="380" width="140" height="12" rx="5" fill="#c8b898"/>
  <text x="175" y="425" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6a5a3a" opacity="0.7">Pebbles</text>
  <text x="175" y="440" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6a5a3a" opacity="0.5">Drainage Layer</text>
  <circle cx="120" cy="415" r="4" fill="#a09070" opacity="0.6"/>
  <circle cx="140" cy="410" r="3" fill="#a09070" opacity="0.5"/>
  <circle cx="160" cy="418" r="5" fill="#a09070" opacity="0.6"/>
  <circle cx="185" cy="412" r="3" fill="#a09070" opacity="0.5"/>
  <circle cx="210" cy="416" r="4" fill="#a09070" opacity="0.6"/>

  <rect x="265" y="420" width="110" height="80" rx="8" fill="url(#bagCharcoal)" filter="url(#softShadow)"/>
  <rect x="265" y="420" width="110" height="10" rx="4" fill="#6a6a6a"/>
  <text x="320" y="455" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa" opacity="0.7">Charcoal</text>
  <text x="320" y="470" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#aaa" opacity="0.5">Filter Layer</text>
  <circle cx="280" cy="445" r="3" fill="#666"/>
  <circle cx="300" cy="448" r="4" fill="#555"/>
  <circle cx="325" cy="445" r="3" fill="#666"/>
  <circle cx="345" cy="448" r="4" fill="#555"/>

  <rect x="405" y="410" width="120" height="90" rx="8" fill="url(#bagSoil)" filter="url(#softShadow)"/>
  <rect x="405" y="410" width="120" height="10" rx="4" fill="#6a4a2a"/>
  <text x="465" y="450" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8a6a3a" opacity="0.7">Soil</text>
  <text x="465" y="465" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8a6a3a" opacity="0.5">Nutrient Mix</text>

  <rect x="555" y="400" width="130" height="100" rx="10" fill="url(#bagMoss)" filter="url(#softShadow)"/>
  <rect x="555" y="400" width="130" height="12" rx="5" fill="#6aaa40"/>
  <text x="620" y="445" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3a7020" opacity="0.7">Moss</text>
  <text x="620" y="460" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3a7020" opacity="0.5">Green &amp; Preserved</text>

  <rect x="555" y="300" width="70" height="70" rx="10" fill="#d08050" filter="url(#softShadow)"/>
  <rect x="555" y="300" width="70" height="10" rx="4" fill="#e09060"/>
  <text x="590" y="335" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6a3a1a" opacity="0.7">Figurine</text>
  <circle cx="590" cy="320" r="8" fill="#e09060"/>
  <ellipse cx="590" cy="328" rx="6" ry="3" fill="#d08050"/>

  <rect x="105" y="310" width="120" height="50" rx="8" fill="#ffcc44" opacity="0.3" filter="url(#softShadow)"/>
  <rect x="105" y="310" width="120" height="8" rx="3" fill="#ffcc44" opacity="0.5"/>
  <text x="165" y="338" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#886622" opacity="0.7">LED Light Ring</text>

  <rect x="265" y="320" width="120" height="75" rx="8" fill="url(#cardGrad)" filter="url(#softShadow)"/>
  <rect x="265" y="320" width="120" height="8" rx="3" fill="#e8dcc8"/>
  <text x="325" y="350" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6a5a3a" opacity="0.7">Instruction Card</text>
  <rect x="278" y="360" width="94" height="3" rx="1.5" fill="#ccc" opacity="0.4"/>
  <rect x="278" y="368" width="80" height="3" rx="1.5" fill="#ccc" opacity="0.4"/>
  <rect x="278" y="376" width="50" height="3" rx="1.5" fill="#ccc" opacity="0.4"/>

  <rect x="405" y="320" width="120" height="70" rx="8" fill="url(#cardGrad)" filter="url(#softShadow)"/>
  <rect x="405" y="320" width="120" height="8" rx="3" fill="#e8dcc8"/>
  <text x="465" y="350" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6a5a3a" opacity="0.7">Setup Guide</text>

  <text x="400" y="580" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888" opacity="0.6">Complete Terrarium Kit &middot; Everything Included</text>
</svg>
