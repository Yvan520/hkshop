<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#e0e8f0" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#d0dce8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c0d0e0" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sleeveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4088cc"/>
      <stop offset="50%" stop-color="#3070b0"/>
      <stop offset="100%" stop-color="#205890"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="40%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d0e8f8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="520" rx="130" ry="14" fill="#00000015"/>

  <g transform="rotate(3, 400, 350)">
    <rect x="335" y="160" width="130" height="270" rx="18" fill="url(#cupGrad)" filter="url(#shadow)"/>
    <rect x="335" y="160" width="130" height="270" rx="18" fill="none" stroke="#c0d0e0" stroke-width="1" opacity="0.4"/>

    <rect x="335" y="340" width="130" height="90" rx="10" fill="url(#sleeveGrad)"/>

    <rect x="335" y="430" width="130" height="40" rx="8" fill="url(#baseGrad)"/>
    <ellipse cx="400" cy="430" rx="48" ry="5" fill="#1a1a1a"/>

    <rect x="350" y="165" width="100" height="60" rx="10" fill="url(#cupGrad)" opacity="0.6"/>

    <circle cx="380" cy="190" r="8" fill="#e05050" opacity="0.5"/>
    <circle cx="400" cy="185" r="6" fill="#e05050" opacity="0.4"/>
    <circle cx="390" cy="205" r="5" fill="#e05050" opacity="0.3"/>
    <circle cx="375" cy="215" r="4" fill="#e05050" opacity="0.25"/>
    <circle cx="408" cy="200" r="7" fill="#e05050" opacity="0.35"/>

    <rect x="365" y="175" width="12" height="12" rx="2" fill="url(#iceGrad)" transform="rotate(15, 371, 181)"/>
    <rect x="390" y="170" width="10" height="10" rx="2" fill="url(#iceGrad)" transform="rotate(-10, 395, 175)"/>
    <rect x="378" y="195" width="11" height="11" rx="2" fill="url(#iceGrad)" transform="rotate(25, 383, 200)"/>

    <rect x="350" y="160" width="100" height="10" rx="5" fill="url(#lidGrad)"/>
    <rect x="370" y="153" width="60" height="12" rx="4" fill="url(#lidGrad)"/>
    <rect x="390" y="145" width="20" height="14" rx="5" fill="url(#lidGrad)"/>
    <rect x="395" y="140" width="10" height="8" rx="3" fill="#c0c0c0"/>
  </g>

  <path d="M 360 250 Q 340 240 330 260 Q 320 280 340 290" fill="none" stroke="#4088cc" stroke-width="2" opacity="0.3"/>
  <path d="M 440 240 Q 460 230 470 250 Q 480 270 460 280" fill="none" stroke="#4088cc" stroke-width="2" opacity="0.3"/>

  <ellipse cx="340" cy="270" rx="8" ry="14" fill="none" stroke="#e05050" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="460" cy="260" rx="6" ry="10" fill="none" stroke="#e05050" stroke-width="1.5" opacity="0.2"/>

  <circle cx="350" cy="255" r="3" fill="#e05050" opacity="0.4"/>
  <circle cx="335" cy="275" r="2.5" fill="#e05050" opacity="0.3"/>
  <circle cx="450" cy="250" r="2.5" fill="#e05050" opacity="0.3"/>
  <circle cx="465" cy="270" r="2" fill="#e05050" opacity="0.25"/>

  <circle cx="370" cy="245" r="2" fill="white" opacity="0.4" filter="url(#blur)"/>
  <circle cx="430" cy="255" r="2" fill="white" opacity="0.3" filter="url(#blur)"/>

  <text x="400" y="570" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888" opacity="0.6">Blending in action</text>
</svg>
