<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="chargerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="50%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5a"/>
      <stop offset="50%" stop-color="#0a2a4a"/>
      <stop offset="100%" stop-color="#061a3a"/>
    </linearGradient>
    <linearGradient id="earbudsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <linearGradient id="watchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="50%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="batteryGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44dd66"/>
      <stop offset="100%" stop-color="#22aa44"/>
    </radialGradient>
    <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44dd66" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#44dd66" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="510" rx="230" ry="20" fill="#00000010"/>

  <rect x="200" y="380" width="400" height="130" rx="50" fill="url(#chargerGrad)" filter="url(#shadow)"/>

  <rect x="240" y="395" width="140" height="70" rx="14" fill="url(#phoneGrad)" filter="url(#shadow)"/>
  <rect x="246" y="401" width="128" height="58" rx="10" fill="url(#screenGrad)"/>

  <rect x="249" y="404" width="20" height="3" rx="1.5" fill="#fff" opacity="0.12"/>

  <rect x="280" y="424" width="30" height="18" rx="3" fill="#222" stroke="#44dd66" stroke-width="1"/>
  <rect x="283" y="426" width="8" height="14" rx="1.5" fill="url(#batteryGrad)"/>
  <rect x="312" y="429" width="2" height="4" rx="1" fill="#44dd66"/>
  <text x="295" y="436" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#44dd66" opacity="0.8">88%</text>

  <path d="M 305 424 L 312 418 L 312 414" fill="none" stroke="#44dd66" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 312 418 L 318 414" fill="none" stroke="#44dd66" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <circle cx="356" cy="421" r="3" fill="#44dd66" opacity="0.6"/>
  <circle cx="356" cy="433" r="3" fill="#44dd66" opacity="0.6"/>
  <circle cx="356" cy="445" r="3" fill="#44dd66" opacity="0.6"/>

  <rect x="250" y="442" width="40" height="2" rx="1" fill="#fff" opacity="0.05"/>
  <rect x="250" y="447" width="55" height="2" rx="1" fill="#fff" opacity="0.05"/>

  <rect x="405" y="405" width="60" height="50" rx="10" fill="url(#earbudsGrad)" filter="url(#shadow)"/>
  <rect x="412" y="412" width="6" height="16" rx="3" fill="#b0b0b0"/>
  <rect x="428" y="412" width="6" height="16" rx="3" fill="#b0b0b0"/>
  <rect x="450" y="412" width="6" height="16" rx="3" fill="#b0b0b0"/>
  <circle cx="435" cy="447" r="4" fill="#44dd66" opacity="0.9" filter="url(#glow)"/>
  <circle cx="435" cy="447" r="2" fill="#88ff88"/>

  <rect x="405" y="400" width="60" height="6" rx="3" fill="#f0f0f0"/>

  <circle cx="435" cy="455" r="2" fill="#44dd66" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="435" cy="455" r="1" fill="#88ff88"/>

  <rect x="490" y="410" width="52" height="40" rx="20" fill="url(#watchGrad)" filter="url(#shadow)"/>
  <rect x="496" y="416" width="40" height="28" rx="14" fill="#0a0a0a"/>

  <text x="516" y="428" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#44dd66">22:00</text>
  <text x="516" y="437" text-anchor="middle" font-family="sans-serif" font-size="3.5" fill="#555">Charging</text>

  <path d="M 500 410 L 510 408 L 520 408 L 530 410" fill="none" stroke="#333" stroke-width="1.5"/>

  <circle cx="516" cy="450" r="2.5" fill="#44dd66" opacity="0.7"/>

  <text x="400" y="545" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Fast Charging - 15W Max</text>
</svg>
