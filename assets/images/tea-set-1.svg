<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="teapotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4c0"/>
      <stop offset="40%" stop-color="#9cbfa0"/>
      <stop offset="100%" stop-color="#7a9e80"/>
    </linearGradient>
    <linearGradient id="teapotHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0e8d4" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#9cbfa0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6a8e70" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4c0"/>
      <stop offset="50%" stop-color="#9cbfa0"/>
      <stop offset="100%" stop-color="#7a9e80"/>
    </linearGradient>
    <linearGradient id="trayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4b888"/>
      <stop offset="30%" stop-color="#c4a470"/>
      <stop offset="100%" stop-color="#a88858"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c49a60"/>
      <stop offset="50%" stop-color="#b08850"/>
      <stop offset="100%" stop-color="#907040"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="480" rx="300" ry="25" fill="#00000010"/>

  <ellipse cx="400" cy="460" rx="260" ry="18" fill="#b08050" opacity="0.08"/>

  <ellipse cx="400" cy="455" rx="200" ry="14" fill="url(#trayGrad)" filter="url(#shadow)"/>
  <ellipse cx="400" cy="450" rx="200" ry="14" fill="#d4b888" opacity="0.3"/>
  <ellipse cx="400" cy="455" rx="195" ry="12" fill="none" stroke="#c4a470" stroke-width="1"/>
  <ellipse cx="400" cy="455" rx="180" ry="10" fill="none" stroke="#b89c68" stroke-width="0.5" opacity="0.5"/>

  <rect x="290" y="140" width="220" height="160" rx="60" fill="url(#teapotGrad)" filter="url(#shadow)"/>
  <rect x="310" y="160" width="180" height="120" rx="50" fill="url(#teapotHighlight)" opacity="0.5"/>
  <rect x="305" y="155" width="50" height="90" rx="25" fill="url(#teapotGrad)" opacity="0.4"/>

  <rect x="370" y="100" width="60" height="50" rx="30" fill="url(#teapotGrad)" filter="url(#softShadow)"/>
  <rect x="380" y="110" width="40" height="30" rx="15" fill="#c8e0cc" opacity="0.4"/>

  <rect x="345" y="95" width="110" height="10" rx="5" fill="url(#teapotGrad)"/>
  <circle cx="400" cy="90" r="8" fill="#6a8e70"/>

  <path d="M 510 180 Q 550 170 540 210 Q 535 230 520 240" fill="none" stroke="url(#woodGrad)" stroke-width="8" stroke-linecap="round" filter="url(#softShadow)"/>

  <path d="M 285 230 Q 265 230 260 240" fill="none" stroke="#c49a60" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="135" y="400" width="60" height="55" rx="15" fill="url(#cupGrad)"/>
    <rect x="145" y="408" width="40" height="35" rx="10" fill="#d0e8d4" opacity="0.3"/>
    <path d="M 195 415 Q 208 418 205 428 Q 202 435 195 438" fill="none" stroke="url(#woodGrad)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="165" cy="400" rx="30" ry="6" fill="#8ab890"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="305" y="400" width="60" height="55" rx="15" fill="url(#cupGrad)"/>
    <rect x="315" y="408" width="40" height="35" rx="10" fill="#d0e8d4" opacity="0.3"/>
    <path d="M 365 415 Q 378 418 375 428 Q 372 435 365 438" fill="none" stroke="url(#woodGrad)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="335" cy="400" rx="30" ry="6" fill="#8ab890"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="465" y="400" width="60" height="55" rx="15" fill="url(#cupGrad)"/>
    <rect x="475" y="408" width="40" height="35" rx="10" fill="#d0e8d4" opacity="0.3"/>
    <path d="M 525 415 Q 538 418 535 428 Q 532 435 525 438" fill="none" stroke="url(#woodGrad)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="495" cy="400" rx="30" ry="6" fill="#8ab890"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="400" width="60" height="55" rx="15" fill="url(#cupGrad)"/>
    <rect x="630" y="408" width="40" height="35" rx="10" fill="#d0e8d4" opacity="0.3"/>
    <path d="M 680 415 Q 693 418 690 428 Q 687 435 680 438" fill="none" stroke="url(#woodGrad)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="650" cy="400" rx="30" ry="6" fill="#8ab890"/>
  </g>
</svg>
