<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="3"/>
      <feGaussianBlur stdDeviation="4" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000000" flood-opacity="0.06" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0d0b0"/>
      <stop offset="40%" stop-color="#d4c09c"/>
      <stop offset="100%" stop-color="#c0a880"/>
    </linearGradient>
    <linearGradient id="boxInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8d8"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d49060"/>
      <stop offset="50%" stop-color="#c07850"/>
      <stop offset="100%" stop-color="#b06840"/>
    </linearGradient>
    <linearGradient id="teapotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4c0"/>
      <stop offset="40%" stop-color="#9cbfa0"/>
      <stop offset="100%" stop-color="#7a9e80"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4c0"/>
      <stop offset="50%" stop-color="#9cbfa0"/>
      <stop offset="100%" stop-color="#7a9e80"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="510" rx="280" ry="22" fill="#00000012"/>

  <rect x="160" y="310" width="480" height="200" rx="12" fill="url(#boxGrad)" filter="url(#shadow)"/>
  <rect x="170" y="315" width="460" height="190" rx="8" fill="url(#boxInner)" filter="url(#innerShadow)"/>

  <rect x="155" y="305" width="490" height="20" rx="6" fill="url(#boxGrad)"/>
  <rect x="155" y="305" width="490" height="6" rx="3" fill="#e8dcc8" opacity="0.5"/>

  <rect x="310" y="290" width="180" height="25" rx="4" fill="url(#ribbonGrad)" filter="url(#softShadow)"/>
  <rect x="310" y="290" width="180" height="4" rx="2" fill="#e0a880" opacity="0.4"/>
  <rect x="370" y="270" width="60" height="25" rx="6" fill="url(#ribbonGrad)" filter="url(#softShadow)"/>
  <rect x="370" y="270" width="60" height="4" rx="2" fill="#e0a880" opacity="0.3"/>
  <path d="M 370 295 Q 365 310 370 325" fill="none" stroke="#c07850" stroke-width="3"/>
  <path d="M 430 295 Q 435 310 430 325" fill="none" stroke="#c07850" stroke-width="3"/>

  <rect x="230" y="260" width="40" height="70" rx="6" fill="url(#boxGrad)" opacity="0.6"/>

  <rect x="280" y="340" width="100" height="80" rx="30" fill="url(#teapotGrad)" filter="url(#softShadow)"/>
  <rect x="295" y="350" width="70" height="55" rx="25" fill="#d0e8d4" opacity="0.3"/>
  <rect x="310" y="320" width="40" height="25" rx="12" fill="url(#teapotGrad)"/>
  <circle cx="330" cy="318" r="4" fill="#6a8e70"/>
  <path d="M 380 360 Q 400 358 398 375 Q 396 385 388 390" fill="none" stroke="#c49a60" stroke-width="4" stroke-linecap="round"/>

  <rect x="420" y="365" width="50" height="50" rx="12" fill="url(#cupGrad)" filter="url(#softShadow)"/>
  <rect x="428" y="373" width="34" height="35" rx="8" fill="#d0e8d4" opacity="0.2"/>
  <path d="M 470 378 Q 480 380 478 388 Q 476 395 470 398" fill="none" stroke="#c49a60" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="445" cy="365" rx="25" ry="5" fill="#8ab890"/>

  <rect x="490" y="368" width="50" height="50" rx="12" fill="url(#cupGrad)" filter="url(#softShadow)"/>
  <rect x="498" y="376" width="34" height="35" rx="8" fill="#d0e8d4" opacity="0.2"/>
  <path d="M 540 381 Q 550 383 548 391 Q 546 398 540 401" fill="none" stroke="#c49a60" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="515" cy="368" rx="25" ry="5" fill="#8ab890"/>

  <rect x="230" y="365" width="50" height="50" rx="12" fill="url(#cupGrad)" filter="url(#softShadow)"/>
  <rect x="238" y="373" width="34" height="35" rx="8" fill="#d0e8d4" opacity="0.2"/>
  <path d="M 280 378 Q 290 380 288 388 Q 286 395 280 398" fill="none" stroke="#c49a60" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="255" cy="365" rx="25" ry="5" fill="#8ab890"/>

  <rect x="540" y="365" width="50" height="50" rx="12" fill="url(#cupGrad)" filter="url(#softShadow)"/>
  <rect x="548" y="373" width="34" height="35" rx="8" fill="#d0e8d4" opacity="0.2"/>
  <path d="M 590 378 Q 600 380 598 388 Q 596 395 590 398" fill="none" stroke="#c49a60" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="565" cy="365" rx="25" ry="5" fill="#8ab890"/>

  <ellipse cx="340" cy="337" rx="50" ry="6" fill="#9cbfa0" opacity="0.3"/>

  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="22" fill="#a88858" opacity="0.7" letter-spacing="8">PREMIUM GIFT SET</text>
</svg>
