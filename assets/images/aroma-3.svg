<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="mistBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="mistBlurSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="ledGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="60%" stop-color="#1a1830"/>
      <stop offset="100%" stop-color="#151020"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#6040aa" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4020aa" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4020aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerGlow" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#aa40aa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#aa40aa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b898"/>
      <stop offset="30%" stop-color="#b8a888"/>
      <stop offset="70%" stop-color="#a09070"/>
      <stop offset="100%" stop-color="#908060"/>
    </linearGradient>
    <linearGradient id="bodySheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d4f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a0a8d0" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="ledPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8860ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#6040cc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6040cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mistGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8860ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8860ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <rect width="800" height="600" fill="url(#bgGlow)"/>
  <rect width="800" height="600" fill="url(#cornerGlow)"/>

  <ellipse cx="400" cy="520" rx="160" ry="16" fill="#00000030"/>

  <rect x="330" y="260" width="140" height="250" rx="20" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="330" y="260" width="140" height="250" rx="20" fill="url(#bodySheen)"/>

  <rect x="345" y="280" width="110" height="140" rx="15" fill="url(#tankGrad)"/>

  <rect x="340" y="265" width="120" height="18" rx="6" fill="#c0b090"/>

  <circle cx="400" cy="500" r="45" fill="url(#ledPurple)" filter="url(#ledGlow)"/>
  <ellipse cx="400" cy="500" r="20" fill="#8860ff" opacity="0.5"/>
  <ellipse cx="400" cy="500" r="10" fill="#aa80ff" opacity="0.4"/>

  <ellipse cx="350" cy="500" rx="40" ry="8" fill="#6040cc" opacity="0.15" filter="url(#ledGlow)"/>
  <ellipse cx="450" cy="500" rx="40" ry="8" fill="#6040cc" opacity="0.15" filter="url(#ledGlow)"/>

  <ellipse cx="400" cy="240" rx="35" ry="10" fill="#8860ff" opacity="0.2" filter="url(#mistBlur)"/>
  <ellipse cx="390" cy="215" rx="40" ry="12" fill="#8860ff" opacity="0.15" filter="url(#mistBlur)"/>
  <ellipse cx="410" cy="190" rx="45" ry="14" fill="#8860ff" opacity="0.12" filter="url(#mistBlurSoft)"/>
  <ellipse cx="395" cy="160" rx="55" ry="18" fill="#8860ff" opacity="0.08" filter="url(#mistBlurSoft)"/>
  <ellipse cx="405" cy="130" rx="65" ry="22" fill="#8860ff" opacity="0.05" filter="url(#mistBlurSoft)"/>

  <ellipse cx="380" cy="220" rx="20" ry="8" fill="#aa80ff" opacity="0.1" filter="url(#mistBlur)"/>
  <ellipse cx="420" cy="200" rx="25" ry="10" fill="#aa80ff" opacity="0.08" filter="url(#mistBlur)"/>

  <circle cx="580" cy="140" r="3" fill="#8860ff" opacity="0.3"/>
  <circle cx="220" cy="100" r="2" fill="#8860ff" opacity="0.2"/>
  <circle cx="650" cy="200" r="4" fill="#8860ff" opacity="0.15"/>
  <circle cx="180" cy="250" r="2.5" fill="#8860ff" opacity="0.2"/>
  <circle cx="620" cy="300" r="3" fill="#8860ff" opacity="0.1"/>
  <circle cx="600" cy="450" r="2" fill="#8860ff" opacity="0.15"/>
</svg>
