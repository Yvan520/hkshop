<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lightGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#e0e8f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d0d8e4" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d8e4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#c0d0e0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b0c0d0" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#3a2510"/>
    </linearGradient>
    <linearGradient id="mossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a9a3a"/>
      <stop offset="50%" stop-color="#4a8830"/>
      <stop offset="100%" stop-color="#3a7020"/>
    </linearGradient>
    <radialGradient id="pebbleGrad" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#b8a888"/>
      <stop offset="100%" stop-color="#908060"/>
    </radialGradient>
    <linearGradient id="ledRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffaa22" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff8833" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="charcoalGrad" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="520" rx="200" ry="18" fill="#00000012"/>

  <rect x="270" y="120" width="260" height="380" rx="30" fill="url(#glassGrad)" stroke="url(#glassEdge)" stroke-width="2" filter="url(#shadow)"/>

  <rect x="290" y="350" width="220" height="130" rx="10" fill="url(#pebbleGrad)" opacity="0.7"/>
  <circle cx="310" cy="380" r="6" fill="#a09070" opacity="0.6"/>
  <circle cx="335" cy="370" r="5" fill="#a09070" opacity="0.5"/>
  <circle cx="360" cy="385" r="7" fill="#a09070" opacity="0.6"/>
  <circle cx="390" cy="375" r="5" fill="#a09070" opacity="0.5"/>
  <circle cx="420" cy="380" r="6" fill="#a09070" opacity="0.6"/>
  <circle cx="445" cy="370" r="5" fill="#a09070" opacity="0.5"/>
  <circle cx="470" cy="385" r="7" fill="#a09070" opacity="0.6"/>
  <circle cx="330" cy="395" r="4" fill="#a09070" opacity="0.4"/>
  <circle cx="400" cy="400" r="5" fill="#a09070" opacity="0.5"/>

  <rect x="290" y="290" width="220" height="60" rx="5" fill="url(#charcoalGrad)" opacity="0.5"/>

  <rect x="290" y="230" width="220" height="60" rx="5" fill="url(#soilGrad)" opacity="0.8"/>

  <rect x="290" y="190" width="220" height="40" rx="8" fill="url(#mossGrad)" opacity="0.7"/>

  <ellipse cx="340" cy="210" rx="25" ry="6" fill="#5a9a3a" opacity="0.5"/>
  <ellipse cx="400" cy="205" rx="30" ry="7" fill="#5a9a3a" opacity="0.5"/>
  <ellipse cx="460" cy="212" rx="22" ry="5" fill="#5a9a3a" opacity="0.5"/>

  <circle cx="410" cy="200" r="3" fill="#6aaa40" opacity="0.6"/>
  <circle cx="430" cy="208" r="2" fill="#6aaa40" opacity="0.5"/>
  <circle cx="380" cy="210" r="2.5" fill="#6aaa40" opacity="0.5"/>

  <rect x="370" y="150" width="40" height="40" rx="10" fill="#d08050"/>
  <rect x="372" y="155" width="36" height="15" rx="5" fill="#e09060"/>
  <rect x="375" y="170" width="4" height="20" fill="#c07040"/>
  <rect x="403" y="170" width="4" height="20" fill="#c07040"/>
  <rect x="383" y="165" width="14" height="25" rx="4" fill="#d08050"/>
  <ellipse cx="390" cy="155" rx="10" ry="5" fill="#e09060"/>
  <ellipse cx="395" cy="150" rx="4" ry="3" fill="#f0a070"/>

  <circle cx="345" cy="195" r="4" fill="#6aaa40" opacity="0.7"/>
  <circle cx="470" cy="200" r="3" fill="#6aaa40" opacity="0.6"/>

  <path d="M 335 195 Q 330 185 335 180" fill="none" stroke="#5a9a3a" stroke-width="1.5" opacity="0.5"/>
  <path d="M 465 200 Q 460 190 465 185" fill="none" stroke="#5a9a3a" stroke-width="1.5" opacity="0.5"/>

  <rect x="280" y="130" width="240" height="30" rx="15" fill="none" stroke="#ffcc44" stroke-width="3" opacity="0.4" filter="url(#glow)"/>
  <rect x="280" y="130" width="240" height="30" rx="15" fill="url(#ledRing)" opacity="0.3" filter="url(#lightGlow)"/>

  <circle cx="320" cy="135" r="6" fill="#ffcc44" opacity="0.5" filter="url(#lightGlow)"/>
  <circle cx="400" cy="135" r="8" fill="#ffcc44" opacity="0.4" filter="url(#lightGlow)"/>
  <circle cx="480" cy="135" r="6" fill="#ffcc44" opacity="0.5" filter="url(#lightGlow)"/>

  <rect x="300" y="485" width="200" height="5" rx="2.5" fill="#ddd" opacity="0.3"/>

  <text x="400" y="565" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Self-Sustaining Terrarium Ecosystem</text>
</svg>
