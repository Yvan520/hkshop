<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </radialGradient>
    <linearGradient id="chargerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="40%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="chargerSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#666" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#888" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#666" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#444" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5a"/>
      <stop offset="50%" stop-color="#0a2a4a"/>
      <stop offset="100%" stop-color="#061a3a"/>
    </linearGradient>
    <linearGradient id="earbudsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <linearGradient id="watchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="50%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="ledGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44dd66" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#44dd66" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <ellipse cx="400" cy="510" rx="280" ry="22" fill="#00000012"/>

  <rect x="160" y="340" width="480" height="170" rx="60" fill="url(#chargerGrad)" filter="url(#shadow)"/>
  <rect x="170" y="345" width="460" height="155" rx="50" fill="url(#chargerSheen)"/>

  <rect x="175" y="350" width="450" height="4" rx="2" fill="#555" opacity="0.3"/>
  <rect x="175" y="495" width="450" height="4" rx="2" fill="#111" opacity="0.3"/>

  <circle cx="600" cy="375" r="5" fill="url(#ledGreen)" filter="url(#glow)"/>
  <circle cx="600" cy="375" r="3" fill="#44dd66"/>

  <circle cx="620" cy="375" r="5" fill="url(#ledGreen)" filter="url(#glow)"/>
  <circle cx="620" cy="375" r="3" fill="#44dd66"/>

  <circle cx="640" cy="375" r="5" fill="url(#ledGreen)" filter="url(#glow)"/>
  <circle cx="640" cy="375" r="3" fill="#44dd66"/>

  <rect x="220" y="360" width="160" height="80" rx="16" fill="url(#phoneGrad)" filter="url(#softShadow)"/>
  <rect x="228" y="368" width="144" height="64" rx="10" fill="url(#screenGrad)"/>

  <rect x="232" y="372" width="28" height="4" rx="2" fill="#fff" opacity="0.15"/>
  <circle cx="356" cy="374" r="2" fill="#fff" opacity="0.1"/>

  <rect x="280" y="400" width="40" height="24" rx="4" fill="#222" stroke="#555" stroke-width="0.5"/>
  <rect x="285" y="404" width="14" height="16" rx="2" fill="#44dd66" opacity="0.8"/>
  <rect x="301" y="404" width="14" height="10" rx="2" fill="#44dd66" opacity="0.5"/>
  <rect x="303" y="408" width="2" height="6" rx="1" fill="#44dd66"/>
  <text x="300" y="420" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#44dd66" opacity="0.6">85%</text>

  <rect x="235" y="410" width="40" height="3" rx="1.5" fill="#fff" opacity="0.08"/>
  <rect x="235" y="416" width="60" height="3" rx="1.5" fill="#fff" opacity="0.08"/>
  <rect x="235" y="422" width="50" height="2" rx="1" fill="#fff" opacity="0.06"/>

  <rect x="410" y="370" width="70" height="60" rx="12" fill="url(#earbudsGrad)" filter="url(#softShadow)"/>
  <rect x="418" y="378" width="8" height="20" rx="4" fill="#c0c0c0"/>
  <rect x="438" y="378" width="8" height="20" rx="4" fill="#c0c0c0"/>
  <rect x="462" y="378" width="8" height="20" rx="4" fill="#c0c0c0"/>
  <circle cx="445" cy="420" r="4" fill="#44dd66" opacity="0.8" filter="url(#glow)"/>
  <rect x="410" y="365" width="70" height="8" rx="4" fill="#f0f0f0"/>

  <rect x="510" y="380" width="60" height="45" rx="22" fill="url(#watchGrad)" filter="url(#softShadow)"/>
  <rect x="516" y="386" width="48" height="33" rx="16" fill="#0a0a0a"/>
  <text x="540" y="400" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#44dd66">21:45</text>
  <text x="540" y="410" text-anchor="middle" font-family="sans-serif" font-size="4" fill="#555">Charging</text>
  <rect x="525" y="380" width="30" height="3" rx="1.5" fill="#333"/>

  <circle cx="540" cy="425" r="3" fill="#44dd66" opacity="0.6"/>

  <text x="400" y="545" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888" opacity="0.6">3-in-1 Wireless Charging Station</text>
</svg>
