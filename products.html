<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Curiohunt &mdash; Browse curious finds sourced from China. Every item sampled, tested, and packed on camera from Hong Kong.">
<title>Products &mdash; Curiohunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav" data-active="products"></nav>

<a href="https://wa.me/85212345678?text=Hi%20I%20saw%20Curiohunt" class="float-wa" target="_blank" aria-label="WhatsApp">
  &#128172;
  <span class="wa-tooltip">Chat with me</span>
</a>

<!-- PRODUCTS -->
<section id="products" class="section" style="padding-top:calc(var(--nav-h) + 48px)">
  <div class="section-inner">
    <div class="gallery-header">
      <div>
        <div class="section-label" data-key="gallery.label">The collection</div>
        <h2>Curious <em>finds</em></h2>
      </div>
      <span id="prodCount" style="font-size:0.85rem;color:var(--text-tertiary)"></span>
    </div>
    <div class="tag-filters" id="tagFilters"></div>
    <div class="prod-grid" id="prodGrid"></div>
  </div>
</section>

<footer id="footer"></footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal" id="modal">
  <div class="modal-header">
    <span style="font-size:0.78rem;color:var(--text-tertiary);font-weight:500" id="modalBreadcrumb">Product detail</span>
    <button class="modal-close" id="modalClose">&times;</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
renderProducts();
</script>
</body>
</html>
